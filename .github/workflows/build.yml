name: Build Electron App (macOS)

on:
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      # 1️⃣ 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 16

      # 3️⃣ 安装python
      - name: Install Python 3
        run: |
          brew install python@3.10
          brew link python@3.10 --force
          ln -sf $(which python3) /usr/local/bin/python

      # 4️⃣ 安装依赖
      - name: Install dependencies
        run: npm install

      # 5️⃣ 应用 dmg-builder Python3 补丁
      - name: Apply dmg-builder Python3 patch
        run: |
          if [ -f node_modules/dmg-builder/vendor/dmgbuild/core.py ]; then
            sed -i '' 's/reload(sys)/import importlib; importlib.reload(sys)/' node_modules/dmg-builder/vendor/dmgbuild/core.py
          fi

      # 6️⃣ 打包 macOS 应用
      - name: Package macOS app
        run: npm run electron:build_mac

      # 7️⃣ 上传构建产物
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist_electron/
