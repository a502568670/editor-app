name: Build Electron App

on:
  # 只在推送 tag 时触发构建，避免重复
  push:
    tags:
      - 'v*'
  # pull_request:
  #   branches:
  #     - main
  #     - master
  workflow_dispatch:

jobs:
  build-mac:
    name: Build macOS
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'
          cache: 'npm'
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: npm install
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_CUSTOM_DIR: '{{ version }}'
      
      - name: Fix dmg-builder for Python 3
        run: npm run fix-dmg-builder
      
      - name: Patch dmg-builder to use python3
        run: |
          # 修改 dmg-builder 使用 python3 而不是 python
          DMG_BUILDER_PATH="node_modules/dmg-builder/out/dmg.js"
          if [ -f "$DMG_BUILDER_PATH" ]; then
            sed -i.bak 's|/usr/bin/python|/usr/bin/python3|g' "$DMG_BUILDER_PATH"
            echo "Patched dmg-builder to use python3"
          fi
      
      - name: Clean up disk mounts before build
        run: |
          # 清理可能存在的挂载点
          hdiutil info | grep "/dev/disk" | awk '{print $1}' | xargs -I {} hdiutil detach {} 2>/dev/null || true
          echo "Cleaned up disk mounts"
      
      - name: Build macOS app
        run: npm run electron:build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Clean up disk mounts after build
        if: always()
        run: |
          # 构建后清理挂载点
          hdiutil info | grep "/dev/disk" | awk '{print $1}' | xargs -I {} hdiutil detach {} -force 2>/dev/null || true
          echo "Cleaned up disk mounts after build"
      
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: |
            dist_electron/*.dmg
            dist_electron/*.zip
          retention-days: 7

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_CUSTOM_DIR: '{{ version }}'
      
      - name: Build Windows app
        run: npm run electron:build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: |
            dist_electron/*.exe
            dist_electron/*.zip
          retention-days: 7

  release:
    name: Create Release
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/macos-builds/*
            artifacts/windows-builds/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

