name: Build/release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 16

      - name: Install dependencies
        run: npm install

      - name: Setup Python for macOS
        if: matrix.os == 'macos-latest'
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dmg-license for macOS
        if: matrix.os == 'macos-latest'
        run: npm install --save-dev dmg-license

      - name: Build/release Electron app (Windows)
        if: matrix.os == 'windows-latest'
        env:
          BACKEND_URL: http://47.96.22.8:8005
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run electron:build:win

      - name: Build/release Electron app (macOS)
        if: matrix.os == 'macos-latest'
        env:
          BACKEND_URL: http://47.96.22.8:8005
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHON_PATH: ${{ env.pythonLocation }}/bin/python3
        run: npm run electron:build:mac

      - name: Upload artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          retention-days: 3
          path: |
            dist_electron/*.exe
            dist_electron/*.exe.blockmap
            dist_electron/latest.yml

      - name: Upload artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          retention-days: 3
          path: |
            dist_electron/*.dmg
            dist_electron/*.dmg.blockmap
            dist_electron/latest-mac.yml

      - name: Release (Windows)
        if: matrix.os == 'windows-latest' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist_electron/*.exe
            dist_electron/*.exe.blockmap
            dist_electron/latest.yml
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release (macOS)
        if: matrix.os == 'macos-latest' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist_electron/*.dmg
            dist_electron/*.dmg.blockmap
            dist_electron/latest-mac.yml
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
