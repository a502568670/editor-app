name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: 安装依赖
        run: npm ci
      
      - name: 构建应用 (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run electron:build:win
        env:
          BACKEND_URL: http://47.96.22.8:8005
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 构建应用 (macOS)
        if: matrix.os == 'macos-latest'
        run: npm run electron:build:mac
        env:
          BACKEND_URL: http://47.96.22.8:8005
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 构建应用 (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npm run electron:build
        env:
          BACKEND_URL: http://47.96.22.8:8005
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 上传到 Release (Windows)
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist_electron/*.exe
            dist_electron/*.exe.blockmap
            dist_electron/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 上传到 Release (macOS)
        if: matrix.os == 'macos-latest'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist_electron/*.dmg
            dist_electron/*.dmg.blockmap
            dist_electron/latest-mac.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 上传到 Release (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist_electron/*.deb
            dist_electron/*.AppImage
            dist_electron/latest-linux.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

